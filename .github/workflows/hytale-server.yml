# =============================================================================
# GitHub Actions Workflow - Hytale Server Docker Image
# Repository: ivanjx/dockers
# =============================================================================
# Multi-architecture build: amd64, arm64
#
# Registry Strategy:
#   - GHCR: all builds (edge, dev, rc, releases)
#
# Tag Strategy (SemVer with Hytale version):
#   - v1.0.0          → GHCR: 1.0.0_{HYTALE_VERSION}, {HYTALE_VERSION}, latest, major, major.minor
#   - v1.0.0-rc.1     → GHCR only: 1.0.0-rc.1_{HYTALE_VERSION}, rc
#   - v1.0.0-dev.1    → GHCR only: 1.0.0-dev.1_{HYTALE_VERSION}, dev
#   - main branch     → GHCR only: edge_{HYTALE_VERSION}, edge
#   - schedule        → auto-build on new Hytale version (every 12h check)
#
# Example tags for release v1.0.0 with Hytale version 2026.01.15-c04fdfe10:
#   GHCR: ghcr.io/ivanjx/hytale-server:1.0.0_2026.01.15-c04fdfe10, :latest, :1, :1.0
# =============================================================================

name: Hytale Server - Build & Push GHCR

on:
  # Scheduled check for new Hytale versions (every 12 hours)
  schedule:
    - cron: '0 */12 * * *'

  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
    paths:
      - 'dockers/hytale-server/**'
      - '.github/workflows/hytale-server.yml'

  pull_request:
    branches:
      - main
      - master
    paths:
      - 'dockers/hytale-server/**'

  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild even if no new Hytale version'
        required: false
        default: 'false'

env:
  # GitHub Container Registry image (all builds: edge, dev, rc, releases)
  GHCR_IMAGE: ghcr.io/ivanjx/hytale-server
  # Build context
  CONTEXT: ./dockers/hytale-server

jobs:
  # ===========================================================================
  # Job 1: Check for new Hytale version
  # ===========================================================================
  check-version:
    runs-on: ubuntu-latest
    environment: prod
    outputs:
      hytale_version: ${{ steps.hytale-version.outputs.version }}
      should_build: ${{ steps.check.outputs.should_build }}
      tag_exists: ${{ steps.check.outputs.tag_exists }}

    steps:
      - name: Download Hytale downloader
        run: |
          curl -fsSL https://downloader.hytale.com/hytale-downloader.zip -o hytale-downloader.zip
          unzip -q hytale-downloader.zip -d hytale-downloader
          chmod +x hytale-downloader/hytale-downloader-linux-amd64

      - name: Create credentials file
        env:
          HYTALE_CREDENTIALS: ${{ secrets.HYTALE_CREDENTIALS }}
        run: |
          if [ -z "$HYTALE_CREDENTIALS" ]; then
            echo "::error::HYTALE_CREDENTIALS secret is empty"
            exit 1
          fi

          printenv HYTALE_CREDENTIALS > .hytale-credentials.json

      - name: Get Hytale version
        id: hytale-version
        timeout-minutes: 1
        run: |
          cp .hytale-credentials.json hytale-downloader/.hytale-downloader-credentials.json

          cd hytale-downloader
          timeout 30s ./hytale-downloader-linux-amd64 -print-version
          VERSION=$(timeout 30s ./hytale-downloader-linux-amd64 -print-version)

          if [ -s .hytale-downloader-credentials.json ]; then
            cp .hytale-downloader-credentials.json ../.hytale-credentials.json
          fi

          # Cleanup credentials
          rm -f .hytale-downloader-credentials.json

          # Validate version format (expected: YYYY.MM.DD-xxxxxxxx)
          if [[ ! "$VERSION" =~ ^[0-9]{4}\.[0-9]{2}\.[0-9]{2}-[a-f0-9]+$ ]]; then
            echo "::error::Invalid version format: '$VERSION'. Expected format: YYYY.MM.DD-xxxxxxxx"
            exit 1
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Hytale version: $VERSION"

      - name: Persist refreshed credentials
        if: github.event_name != 'pull_request' && always()
        env:
          GH_TOKEN: ${{ secrets.HYTALE_CREDENTIALS_SYNC_TOKEN }}
        run: |
          trap 'rm -f .hytale-credentials.json' EXIT

          if [ ! -s .hytale-credentials.json ]; then
            echo "No refreshed credentials file produced; skipping secret sync"
            exit 0
          fi

          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::HYTALE_CREDENTIALS_SYNC_TOKEN is not configured; refreshed credentials were not persisted"
            exit 0
          fi

          gh secret set HYTALE_CREDENTIALS \
            --env prod \
            --repo "$GITHUB_REPOSITORY" \
            --body-file .hytale-credentials.json

      - name: Check if build is needed
        id: check
        run: |
          HYTALE_VERSION="${{ steps.hytale-version.outputs.version }}"
          FORCE_REBUILD="${{ github.event.inputs.force_rebuild }}"
          EVENT_NAME="${{ github.event_name }}"

          # Check if an image with this Hytale version tag already exists on GHCR
          TAG_EXISTS="false"
          if docker manifest inspect "${{ env.GHCR_IMAGE }}:${HYTALE_VERSION}" > /dev/null 2>&1; then
            TAG_EXISTS="true"
            echo "Image with tag ${HYTALE_VERSION} already exists on GHCR"
          else
            echo "Image with tag ${HYTALE_VERSION} not found on GHCR"
          fi

          # Always build for:
          # - Tag pushes (release)
          # - Push to main with path changes
          # - Force rebuild
          # - New Hytale version detected (tag doesn't exist)
          # - Pull requests (for testing)

          # Export tag_exists for all cases
          echo "tag_exists=$TAG_EXISTS" >> $GITHUB_OUTPUT

          if [[ "$EVENT_NAME" == "push" && "$GITHUB_REF" == refs/tags/* ]]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "Build needed: tag push"
          elif [[ "$EVENT_NAME" == "push" ]]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "Build needed: push to branch with path changes"
          elif [[ "$EVENT_NAME" == "pull_request" ]]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "Build needed: pull request"
          elif [[ "$FORCE_REBUILD" == "true" ]]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "Build needed: force rebuild requested"
          elif [[ "$TAG_EXISTS" == "false" ]]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "Build needed: new Hytale version (${HYTALE_VERSION})"
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "No build needed: image for Hytale version ${HYTALE_VERSION} already exists"
          fi

  # ===========================================================================
  # Job 2: Build and Push Docker Image
  # ===========================================================================
  build:
    needs: check-version
    runs-on: ubuntu-latest
    environment: prod
    if: needs.check-version.outputs.should_build == 'true'
    permissions:
      contents: read
      packages: write

    steps:
      # -----------------------------------------------------------------------
      # Checkout and Setup
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU for multi-arch builds
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      # -----------------------------------------------------------------------
      # Download Hytale Game Files
      # -----------------------------------------------------------------------
      - name: Create credentials file
        env:
          HYTALE_CREDENTIALS: ${{ secrets.HYTALE_CREDENTIALS }}
        run: |
          if [ -z "$HYTALE_CREDENTIALS" ]; then
            echo "::error::HYTALE_CREDENTIALS secret is empty"
            exit 1
          fi

          printenv HYTALE_CREDENTIALS > .hytale-credentials.json

      - name: Download Hytale game files
        run: |
          # Download the downloader
          curl -fsSL https://downloader.hytale.com/hytale-downloader.zip -o hytale-downloader.zip
          unzip -q hytale-downloader.zip -d hytale-downloader

          # Setup credentials
          cp .hytale-credentials.json hytale-downloader/.hytale-downloader-credentials.json
          chmod +x hytale-downloader/hytale-downloader-linux-amd64

          # Download game files
          cd hytale-downloader
          ./hytale-downloader-linux-amd64 -download-path ../game.zip

          if [ -s .hytale-downloader-credentials.json ]; then
            cp .hytale-downloader-credentials.json ../.hytale-credentials.json
          fi

          # Extract game files
          cd ..
          mkdir -p game-files
          unzip -q game.zip -d game-files

          # Cleanup sensitive files
          rm -f hytale-downloader/.hytale-downloader-credentials.json

          echo "Game files downloaded and extracted to game-files/"
          ls -la game-files/

      - name: Persist refreshed credentials
        if: github.event_name != 'pull_request' && always()
        env:
          GH_TOKEN: ${{ secrets.HYTALE_CREDENTIALS_SYNC_TOKEN }}
        run: |
          trap 'rm -f .hytale-credentials.json' EXIT

          if [ ! -s .hytale-credentials.json ]; then
            echo "No refreshed credentials file produced; skipping secret sync"
            exit 0
          fi

          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::HYTALE_CREDENTIALS_SYNC_TOKEN is not configured; refreshed credentials were not persisted"
            exit 0
          fi

          gh secret set HYTALE_CREDENTIALS \
            --env prod \
            --repo "$GITHUB_REPOSITORY" \
            --body-file .hytale-credentials.json

      # -----------------------------------------------------------------------
      # Authentication
      # -----------------------------------------------------------------------
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # Determine version type and generate tags
      # -----------------------------------------------------------------------
      - name: Determine version type
        id: version
        run: |
          REF="${GITHUB_REF}"
          HYTALE_VERSION="${{ needs.check-version.outputs.hytale_version }}"

          if [[ "$REF" == refs/tags/v* ]]; then
            IMAGE_VERSION="${REF#refs/tags/v}"

            if [[ "$IMAGE_VERSION" == *"-rc"* ]]; then
              echo "type=rc" >> $GITHUB_OUTPUT
            elif [[ "$IMAGE_VERSION" == *"-dev"* ]] || [[ "$IMAGE_VERSION" == *"-alpha"* ]] || [[ "$IMAGE_VERSION" == *"-beta"* ]]; then
              echo "type=dev" >> $GITHUB_OUTPUT
            else
              echo "type=release" >> $GITHUB_OUTPUT
            fi
            echo "image_version=$IMAGE_VERSION" >> $GITHUB_OUTPUT
          else
            echo "type=edge" >> $GITHUB_OUTPUT
            echo "image_version=edge" >> $GITHUB_OUTPUT
          fi

          echo "hytale_version=$HYTALE_VERSION" >> $GITHUB_OUTPUT

          echo "Detected type: $(grep type $GITHUB_OUTPUT | tail -1 | cut -d= -f2)"
          echo "Image version: $(grep image_version $GITHUB_OUTPUT | tail -1 | cut -d= -f2)"
          echo "Hytale version: $HYTALE_VERSION"

      - name: Generate Docker tags
        id: tags
        run: |
          GHCR_IMAGE="${{ env.GHCR_IMAGE }}"
          IMAGE_VERSION="${{ steps.version.outputs.image_version }}"
          HYTALE_VERSION="${{ steps.version.outputs.hytale_version }}"
          VERSION_TYPE="${{ steps.version.outputs.type }}"

          # Build the full version tag: IMAGE_VERSION_HYTALE_VERSION
          FULL_VERSION="${IMAGE_VERSION}_${HYTALE_VERSION}"

          # GHCR publishes all supported tag variants.
          if [[ "$VERSION_TYPE" == "release" ]]; then
            TAGS="${GHCR_IMAGE}:${FULL_VERSION}"

            # Hytale version tag (latest image for this Hytale version)
            TAGS="${TAGS},${GHCR_IMAGE}:${HYTALE_VERSION}"

            # Latest tag
            TAGS="${TAGS},${GHCR_IMAGE}:latest"

            # SemVer tags (major.minor, major)
            MAJOR=$(echo "$IMAGE_VERSION" | cut -d. -f1)
            MINOR=$(echo "$IMAGE_VERSION" | cut -d. -f2)
            if [[ "$MAJOR" != "0" ]]; then
              TAGS="${TAGS},${GHCR_IMAGE}:${MAJOR}"
            fi
            TAGS="${TAGS},${GHCR_IMAGE}:${MAJOR}.${MINOR}"
          else
            # Non-release: push to GHCR only
            TAGS="${GHCR_IMAGE}:${FULL_VERSION}"

            # RC tag
            if [[ "$VERSION_TYPE" == "rc" ]]; then
              TAGS="${TAGS},${GHCR_IMAGE}:rc"
            fi

            # Dev tag
            if [[ "$VERSION_TYPE" == "dev" ]]; then
              TAGS="${TAGS},${GHCR_IMAGE}:dev"
            fi

            # Edge tag
            if [[ "$VERSION_TYPE" == "edge" ]]; then
              TAGS="${TAGS},${GHCR_IMAGE}:edge"
            fi

            # PR tag (GHCR only)
            if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              PR_NUMBER="${{ github.event.pull_request.number }}"
              TAGS="${TAGS},${GHCR_IMAGE}:pr-${PR_NUMBER}"
            fi
          fi

          echo "tags=$TAGS" >> $GITHUB_OUTPUT
          echo "Generated tags:"
          echo "$TAGS" | tr ',' '\n'

      # -----------------------------------------------------------------------
      # Build and Push
      # -----------------------------------------------------------------------
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.CONTEXT }}
          file: ${{ env.CONTEXT }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.version.outputs.image_version }}
            HYTALE_VERSION=${{ steps.version.outputs.hytale_version }}
          build-contexts: |
            game=./game-files
          cache-from: type=gha,scope=hytale-server
          cache-to: type=gha,mode=max,scope=hytale-server
          provenance: true
          sbom: true
          labels: |
            org.opencontainers.image.title=Hytale Dedicated Server
            org.opencontainers.image.description=Optimized Hytale dedicated server Docker image with Java 25
            hytale.version=${{ steps.version.outputs.hytale_version }}

      # -----------------------------------------------------------------------
      # Summary
      # -----------------------------------------------------------------------
      - name: Generate build summary
        run: |
          echo "## 🐳 Hytale Server - Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Information" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Version Type** | \`${{ steps.version.outputs.type }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image Version** | \`${{ steps.version.outputs.image_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Hytale Version** | \`${{ steps.version.outputs.hytale_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Full Tag** | \`${{ steps.version.outputs.image_version }}_${{ steps.version.outputs.hytale_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Platforms** | linux/amd64, linux/arm64 |" >> $GITHUB_STEP_SUMMARY
          echo "| **Digest** | \`${{ steps.build.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Registry" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**GitHub Container Registry:** \`${{ env.GHCR_IMAGE }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Tags" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.tags.outputs.tags }}" | tr ',' '\n' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Usage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "# Latest stable release" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.GHCR_IMAGE }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Specific Hytale version (latest image)" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.GHCR_IMAGE }}:${{ steps.version.outputs.hytale_version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Specific image + Hytale version" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.GHCR_IMAGE }}:${{ steps.version.outputs.image_version }}_${{ steps.version.outputs.hytale_version }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Job 3: Security Scan (only for releases and RC)
  # ===========================================================================
  security-scan:
    needs: [check-version, build]
    runs-on: ubuntu-latest
    if: |
      needs.build.result == 'success' &&
      github.event_name != 'pull_request' &&
      (contains(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine scan tag
        id: scan-tag
        run: |
          REF="${GITHUB_REF}"
          if [[ "$REF" == refs/tags/v* ]]; then
            VERSION="${REF#refs/tags/v}"
            if [[ "$VERSION" == *"-rc"* ]]; then
              echo "tag=rc" >> $GITHUB_OUTPUT
            elif [[ "$VERSION" == *"-dev"* ]]; then
              echo "tag=dev" >> $GITHUB_OUTPUT
            else
              echo "tag=latest" >> $GITHUB_OUTPUT
            fi
          else
            echo "tag=edge" >> $GITHUB_OUTPUT
          fi

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.GHCR_IMAGE }}:${{ steps.scan-tag.outputs.tag }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          skip-files: 'opt/hytale-server/HytaleServer.jar,opt/hytale-server/Assets.zip'
          scanners: 'vuln,secret'
          timeout: '30m'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ===========================================================================
  # Job 4: Skip notification (for scheduled runs with no new version)
  # ===========================================================================
  skip-notification:
    needs: check-version
    runs-on: ubuntu-latest
    if: needs.check-version.outputs.should_build == 'false' && github.event_name == 'schedule'

    steps:
      - name: Log skip reason
        run: |
          echo "## ⏭️ Build Skipped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "No new Hytale version detected." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Hytale Version** | \`${{ needs.check-version.outputs.hytale_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tag Exists** | \`${{ needs.check-version.outputs.tag_exists }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The scheduled check found no updates. Next check in 12 hours." >> $GITHUB_STEP_SUMMARY
