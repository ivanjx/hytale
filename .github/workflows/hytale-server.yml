# =============================================================================
# GitHub Actions Workflow - Hytale Server Docker Image
# Repository: ivanjx/dockers
# =============================================================================
# Multi-architecture build: amd64, arm64
#
# Registry Strategy:
#   - GHCR: all builds (edge, dev, rc, releases)
#
# Tag Strategy:
#   - On push/main/master/schedule: build from latest Hytale downloader version
#   - GHCR: push tags `latest` and `<HYTALE_VERSION>` only
#   - No Git tag-derived version tags (semver/rc/dev/edge) are created
#
# Example tags for Hytale version 2026.01.15-c04fdfe10:
#   GHCR: ghcr.io/ivanjx/hytale-server:2026.01.15-c04fdfe10, ghcr.io/ivanjx/hytale-server:latest
# =============================================================================

name: Hytale Server - Build & Push GHCR

on:
  # Scheduled check for new Hytale versions (every 12 hours)
  schedule:
    - cron: '0 */12 * * *'

  push:
    branches:
      - main
      - master
    paths:
      - 'dockers/hytale-server/**'
      - '.github/workflows/hytale-server.yml'

  pull_request:
    branches:
      - main
      - master
    paths:
      - 'dockers/hytale-server/**'

  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild even if no new Hytale version'
        required: false
        default: 'false'

env:
  # GitHub Container Registry image (all builds: edge, dev, rc, releases)
  GHCR_IMAGE: ghcr.io/ivanjx/hytale-server
  # Build context
  CONTEXT: ./dockers/hytale-server

jobs:
  # ===========================================================================
  # Job 1: Check for new Hytale version
  # ===========================================================================
  check-version:
    runs-on: ubuntu-latest
    environment: prod
    outputs:
      hytale_version: ${{ steps.hytale-version.outputs.version }}
      should_build: ${{ steps.check.outputs.should_build }}
      tag_exists: ${{ steps.check.outputs.tag_exists }}

    steps:
      - name: Download Hytale downloader
        run: |
          curl -fsSL https://downloader.hytale.com/hytale-downloader.zip -o hytale-downloader.zip
          unzip -q hytale-downloader.zip -d hytale-downloader
          chmod +x hytale-downloader/hytale-downloader-linux-amd64

      - name: Create credentials file
        env:
          HYTALE_CREDENTIALS: ${{ secrets.HYTALE_CREDENTIALS }}
        run: |
          if [ -z "$HYTALE_CREDENTIALS" ]; then
            echo "::error::HYTALE_CREDENTIALS secret is empty"
            exit 1
          fi

          printenv HYTALE_CREDENTIALS > .hytale-credentials.json

      - name: Get Hytale version
        id: hytale-version
        timeout-minutes: 1
        run: |
          cp .hytale-credentials.json hytale-downloader/.hytale-downloader-credentials.json

          cd hytale-downloader
          timeout 30s ./hytale-downloader-linux-amd64 -print-version
          VERSION=$(timeout 30s ./hytale-downloader-linux-amd64 -print-version)

          if [ -s .hytale-downloader-credentials.json ]; then
            cp .hytale-downloader-credentials.json ../.hytale-credentials.json
          fi

          # Cleanup credentials
          rm -f .hytale-downloader-credentials.json

          # Validate version format (expected: YYYY.MM.DD-xxxxxxxx)
          if [[ ! "$VERSION" =~ ^[0-9]{4}\.[0-9]{2}\.[0-9]{2}-[a-f0-9]+$ ]]; then
            echo "::error::Invalid version format: '$VERSION'. Expected format: YYYY.MM.DD-xxxxxxxx"
            exit 1
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Hytale version: $VERSION"

      - name: Persist refreshed credentials
        if: github.event_name != 'pull_request' && always()
        env:
          GH_TOKEN: ${{ secrets.HYTALE_CREDENTIALS_SYNC_TOKEN }}
        run: |
          trap 'rm -f .hytale-credentials.json' EXIT

          if [ ! -s .hytale-credentials.json ]; then
            echo "No refreshed credentials file produced; skipping secret sync"
            exit 0
          fi

          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::HYTALE_CREDENTIALS_SYNC_TOKEN is not configured; refreshed credentials were not persisted"
            exit 0
          fi

          gh secret set HYTALE_CREDENTIALS \
            --env prod \
              --repo "$GITHUB_REPOSITORY" < .hytale-credentials.json

      - name: Check if build is needed
        id: check
        run: |
          HYTALE_VERSION="${{ steps.hytale-version.outputs.version }}"
          FORCE_REBUILD="${{ github.event.inputs.force_rebuild }}"
          EVENT_NAME="${{ github.event_name }}"

          # Check if an image with this Hytale version tag already exists on GHCR
          TAG_EXISTS="false"
          if docker manifest inspect "${{ env.GHCR_IMAGE }}:${HYTALE_VERSION}" > /dev/null 2>&1; then
            TAG_EXISTS="true"
            echo "Image with tag ${HYTALE_VERSION} already exists on GHCR"
          else
            echo "Image with tag ${HYTALE_VERSION} not found on GHCR"
          fi

          # Always build for:
          # - Push to main/master with path changes
          # - Force rebuild
          # - New Hytale version detected
          # - Pull requests (for testing)

          # Export tag_exists for all cases
          echo "tag_exists=$TAG_EXISTS" >> $GITHUB_OUTPUT

          if [[ "$EVENT_NAME" == "push" ]]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "Build needed: push to branch with path changes"
          elif [[ "$EVENT_NAME" == "pull_request" ]]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "Build needed: pull request"
          elif [[ "$FORCE_REBUILD" == "true" ]]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "Build needed: force rebuild requested"
          elif [[ "$TAG_EXISTS" == "false" ]]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "Build needed: new Hytale version (${HYTALE_VERSION})"
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "No build needed: image for Hytale version ${HYTALE_VERSION} already exists"
          fi

  # ===========================================================================
  # Job 2: Build and Push Docker Image
  # ===========================================================================
  build:
    needs: check-version
    runs-on: ubuntu-latest
    environment: prod
    if: needs.check-version.outputs.should_build == 'true'
    permissions:
      contents: read
      packages: write

    steps:
      # -----------------------------------------------------------------------
      # Checkout and Setup
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU for multi-arch builds
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      # -----------------------------------------------------------------------
      # Download Hytale Game Files
      # -----------------------------------------------------------------------
      - name: Create credentials file
        env:
          HYTALE_CREDENTIALS: ${{ secrets.HYTALE_CREDENTIALS }}
        run: |
          if [ -z "$HYTALE_CREDENTIALS" ]; then
            echo "::error::HYTALE_CREDENTIALS secret is empty"
            exit 1
          fi

          printenv HYTALE_CREDENTIALS > .hytale-credentials.json

      - name: Download Hytale game files
        run: |
          # Download the downloader
          curl -fsSL https://downloader.hytale.com/hytale-downloader.zip -o hytale-downloader.zip
          unzip -q hytale-downloader.zip -d hytale-downloader

          # Setup credentials
          cp .hytale-credentials.json hytale-downloader/.hytale-downloader-credentials.json
          chmod +x hytale-downloader/hytale-downloader-linux-amd64

          # Download game files
          cd hytale-downloader
          ./hytale-downloader-linux-amd64 -download-path ../game.zip

          if [ -s .hytale-downloader-credentials.json ]; then
            cp .hytale-downloader-credentials.json ../.hytale-credentials.json
          fi

          # Extract game files
          cd ..
          mkdir -p game-files
          unzip -q game.zip -d game-files

          # Cleanup sensitive files
          rm -f hytale-downloader/.hytale-downloader-credentials.json

          echo "Game files downloaded and extracted to game-files/"
          ls -la game-files/

      - name: Persist refreshed credentials
        if: github.event_name != 'pull_request' && always()
        env:
          GH_TOKEN: ${{ secrets.HYTALE_CREDENTIALS_SYNC_TOKEN }}
        run: |
          trap 'rm -f .hytale-credentials.json' EXIT

          if [ ! -s .hytale-credentials.json ]; then
            echo "No refreshed credentials file produced; skipping secret sync"
            exit 0
          fi

          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::HYTALE_CREDENTIALS_SYNC_TOKEN is not configured; refreshed credentials were not persisted"
            exit 0
          fi

          gh secret set HYTALE_CREDENTIALS \
            --env prod \
              --repo "$GITHUB_REPOSITORY" < .hytale-credentials.json

      # -----------------------------------------------------------------------
      # Authentication
      # -----------------------------------------------------------------------
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # Generate tags (latest + downloader Hytale version)
      # -----------------------------------------------------------------------
      - name: Generate Docker tags
        id: tags
        run: |
          GHCR_IMAGE="${{ env.GHCR_IMAGE }}"
          HYTALE_VERSION="${{ needs.check-version.outputs.hytale_version }}"

          # Only publish latest and Hytale version tags
          TAGS="${GHCR_IMAGE}:${HYTALE_VERSION},${GHCR_IMAGE}:latest"

          echo "tags=$TAGS" >> $GITHUB_OUTPUT
          echo "Generated tags:"
          echo "$TAGS" | tr ',' '\n'

      # -----------------------------------------------------------------------
      # Build and Push
      # -----------------------------------------------------------------------
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.CONTEXT }}
          file: ${{ env.CONTEXT }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}
            HYTALE_VERSION=${{ needs.check-version.outputs.hytale_version }}
          build-contexts: |
            game=./game-files
          cache-from: type=gha,scope=hytale-server
          cache-to: type=gha,mode=max,scope=hytale-server
          provenance: true
          sbom: true
          labels: |
            org.opencontainers.image.title=Hytale Dedicated Server
            org.opencontainers.image.description=Optimized Hytale dedicated server Docker image with Java 25
            hytale.version=${{ needs.check-version.outputs.hytale_version }}

      # -----------------------------------------------------------------------
      # Summary
      # -----------------------------------------------------------------------
      - name: Generate build summary
        run: |
          echo "## 🐳 Hytale Server - Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Information" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Hytale Version** | \`${{ needs.check-version.outputs.hytale_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tag Set** | \`latest, ${{ needs.check-version.outputs.hytale_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Platforms** | linux/amd64, linux/arm64 |" >> $GITHUB_STEP_SUMMARY
          echo "| **Digest** | \`${{ steps.build.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Registry" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**GitHub Container Registry:** \`${{ env.GHCR_IMAGE }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Tags" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.tags.outputs.tags }}" | tr ',' '\n' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Usage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "# Latest stable release" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.GHCR_IMAGE }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Specific Hytale version (latest image)" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.GHCR_IMAGE }}:${{ needs.check-version.outputs.hytale_version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Latest" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.GHCR_IMAGE }}:latest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Job 4: Skip notification (for scheduled runs with no new version)
  # ===========================================================================
  skip-notification:
    needs: check-version
    runs-on: ubuntu-latest
    if: needs.check-version.outputs.should_build == 'false' && github.event_name == 'schedule'

    steps:
      - name: Log skip reason
        run: |
          echo "## ⏭️ Build Skipped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "No new Hytale version detected." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Hytale Version** | \`${{ needs.check-version.outputs.hytale_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tag Exists** | \`${{ needs.check-version.outputs.tag_exists }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The scheduled check found no updates. Next check in 12 hours." >> $GITHUB_STEP_SUMMARY
